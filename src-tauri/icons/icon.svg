<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    App icon for Ash's P&amp;ID Playground.
    Re-draws the centrifugal pump symbol used in the editor
    (src/symbols/equipment/CentrifugalPump.tsx) on a dark navy
    rounded-square plaque: discharge nozzle stub at the top, suction
    nozzle stub at the bottom, inscribed triangle pointing up.
    Coordinate math: the source symbol lives in a 64x64 viewbox; we
    scale by 11.5 and translate so the symbol is centred.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="192" ry="192" fill="url(#bg)"/>

  <g
    transform="translate(512 512) scale(11.5) translate(-32 -32)"
    fill="none"
    stroke="#7dd3fc"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <circle cx="32" cy="32" r="18"/>
    <path d="M 32 14 L 47.59 41 L 16.41 41 Z"/>
    <line x1="32" y1="2" x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="62"/>
  </g>
</svg>
